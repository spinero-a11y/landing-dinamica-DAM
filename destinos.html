<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeranoSummer - Selección de Vuelo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=JetBrains+Mono:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    
    <style>
        :root { --primary: #1a2a6c; --accent: #ffeb00; --success: #27ae60; --dark: #16213e; }
        body { font-family: 'DM Sans', sans-serif; background-color: #f0f2f5; margin: 0; color: #333; }
        
        .vuelos-container { padding: 40px 20px; max-width: 1100px; margin: 0 auto; position: relative; }
        
        /* Botón Volver al Índice */
        .btn-volver {
            position: absolute;
            top: 10px;
            left: 20px;
            text-decoration: none;
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-volver:hover { color: var(--success); transform: translateX(-5px); }

        .vuelos-header { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%); 
            padding: 40px 30px 30px 30px; border-radius: 15px; color: white; margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(26, 42, 108, 0.2);
            margin-top: 20px;
        }
        .vuelos-header h1 { margin: 0; font-family: 'Fraunces', serif; font-size: 2.2rem; }

        .filtros-vuelos { 
            background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px;
            display: flex; gap: 25px; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .filtro-grupo { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .filtro-grupo label { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: bold; color: var(--primary); }
        
        input[type="number"], input[type="range"] { padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }

        .vuelo-card { 
            background: white; border-radius: 12px; padding: 25px; margin-bottom: 15px;
            display: grid; grid-template-columns: 1fr 280px; gap: 20px;
            border: 1px solid #eef0f2; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .vuelo-card:hover { transform: scale(1.01); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: var(--primary); }

        .vuelo-detalles { display: flex; align-items: center; justify-content: space-between; }
        .vuelo-hora { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 700; color: var(--primary); }

        .vuelo-pago { 
            border-left: 1px dashed #ddd; padding-left: 30px; 
            display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
        }
        .vuelo-precio { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; color: var(--success); font-weight: 700; }
        .precio-desglose { font-size: 0.75rem; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .vuelo-btn { 
            background: var(--primary); color: white; border: none; padding: 12px 25px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .vuelo-btn:hover { background: var(--accent); color: var(--primary); }

        @media (max-width: 768px) {
            .vuelo-card { grid-template-columns: 1fr; }
            .vuelo-pago { border-left: none; border-top: 1px dashed #ddd; padding: 20px 0 0 0; align-items: center; }
            .filtros-vuelos { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="vuelos-container">
    <!-- Botón Volver -->
    <a href="index.html" class="btn-volver">
        ⬅ Volver al índice
    </a>

    <div class="vuelos-header">
        <h1>Vuelos Disponibles</h1>
        <p style="opacity: 0.8; margin: 10px 0 0 0;">Selecciona el vuelo que mejor se adapte a tu viaje</p>
    </div>

    <div class="filtros-vuelos">
        <div class="filtro-grupo">
            <label>👤 NÚMERO DE PASAJEROS</label>
            <input type="number" id="num-pasajeros" min="1" max="10" value="1" oninput="actualizarPrecios()">
        </div>

        <div class="filtro-grupo">
            <label>💰 PRECIO MÁX. (POR PERSONA)</label>
            <input type="range" id="filtro-precio" min="40" max="1200" value="1200" oninput="actualizarPrecios()">
            <span id="precio-valor" style="font-family: 'JetBrains Mono'; color: var(--success); font-weight: bold;">1200€</span>
        </div>
    </div>

    <div id="lista-vuelos">
        <!-- Generado dinámicamente -->
    </div>
</div>

<script>
    // Datos simulados (puedes quitarlos si ya los tienes en destinos.js)
    const vuelos = [
        { aerolinea: "Iberia Express", origen: "MAD", destino: "TCI", hSalida: "07:15", hLlegada: "10:00", precio: 85 },
        { aerolinea: "Air Europa", origen: "MAD", destino: "TCI", hSalida: "12:30", hLlegada: "15:15", precio: 110 },
        { aerolinea: "Ryanair", origen: "MAD", destino: "TCI", hSalida: "21:00", hLlegada: "23:45", precio: 42 }
    ];

    function actualizarPrecios() {
        const contenedor = document.getElementById('lista-vuelos');
        const numPasajeros = parseInt(document.getElementById('num-pasajeros').value) || 1;
        const precioFiltro = document.getElementById('filtro-precio').value;
        
        document.getElementById('precio-valor').innerText = precioFiltro + "€";
        contenedor.innerHTML = "";

        const filtrados = vuelos.filter(v => v.precio <= precioFiltro);

        filtrados.forEach(v => {
            const precioFinal = v.precio * numPasajeros;
            contenedor.innerHTML += `
                <div class="vuelo-card">
                    <div class="vuelo-detalles">
                        <div style="text-align: left;">
                            <div class="vuelo-hora">${v.hSalida}</div>
                            <div style="font-weight:bold; color:#888;">${v.origen}</div>
                        </div>
                        <div style="flex:1; text-align:center; padding: 0 30px;">
                            <div style="font-size:0.8rem; color:#666; margin-bottom:5px;">${v.aerolinea}</div>
                            <div style="height:2px; background:#e0e0e0; position:relative;"></div>
                            <div style="font-size:0.7rem; margin-top:5px; color:var(--success)">Directo</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="vuelo-hora">${v.hLlegada}</div>
                            <div style="font-weight:bold; color:#888;">${v.destino}</div>
                        </div>
                    </div>
                    <div class="vuelo-pago">
                        <div class="precio-desglose">${numPasajeros} Pasajero(s) x ${v.precio}€</div>
                        <div class="vuelo-precio">${precioFinal}€</div>
                       
<button class="vuelo-btn" onclick="irACompra('${v.aerolinea}', ${precioFinal}, ${numPasajeros})">RESERVAR</button>
                    </div>
                </div>
            `;
        });

        if (filtrados.length === 0) {
            contenedor.innerHTML = `<div style="text-align:center; padding:40px; color:#666;">No hay vuelos por debajo de ${precioFiltro}€. Intenta subir el rango de precio.</div>`;
        }
    }
function irACompra(aerolinea, precio, pasajeros) {
    
    const url = `compra.html?aerolinea=${encodeURIComponent(aerolinea)}&precio=${precio}&pasajeros=${pasajeros}`;
    
    // Navega a la página de compra
    window.location.href = url;
}
    // Inicializar
    actualizarPrecios();
</script>

</body>
</html>
