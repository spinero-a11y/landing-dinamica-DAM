<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vuelos - VeranoSummer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css">

  <style>
    .vuelos-container {
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .vuelos-header {
      margin-bottom: 40px;
      padding: 20px;
      background: linear-gradient(135deg, #1a2a6c 0%, #16213e 100%);
      border-radius: 12px;
      color: white;
    }

    .vuelos-header h1 {
      margin: 0 0 10px 0;
      font-size: 2.5rem;
      font-family: 'Fraunces', serif;
    }

    .ruta-info {
      font-size: 1.1rem;
      margin-bottom: 15px;
    }

    .ruta-info span {
      font-weight: bold;
      color: #ffeb00;
    }

    .filtros-vuelos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 12px;
    }

    .filtro-grupo {
      display: flex;
      flex-direction: column;
    }

    .filtro-grupo label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #1a2a6c;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
    }

    .filtro-grupo select,
    .filtro-grupo input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
    }

    .vuelos-lista {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .vuelo-card {
      background: white;
      border: 1px solid #e2e2e2;
      border-radius: 12px;
      padding: 25px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 30px;
      align-items: center;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .vuelo-card:hover {
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transform: translateY(-2px);
    }

    .vuelo-detalles {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 40px;
      align-items: center;
    }

    .vuelo-aeropuerto {
      text-align: center;
    }

    .vuelo-hora {
      font-size: 1.8rem;
      font-weight: bold;
      color: #1a2a6c;
      font-family: 'JetBrains Mono', monospace;
    }

    .vuelo-ciudad {
      font-size: 0.9rem;
      color: #666;
      margin-top: 5px;
    }

    .vuelo-ruta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      color: #999;
    }

    .vuelo-ruta-linea {
      flex: 1;
      height: 2px;
      background: linear-gradient(to right, #1a2a6c, transparent);
      min-width: 100px;
    }

    .vuelo-ruta-icon {
      font-size: 1.5rem;
    }

    .vuelo-duracion {
      font-size: 0.85rem;
      color: #666;
      text-align: center;
      margin-top: 10px;
    }

    .vuelo-aerolinea {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vuelo-aerolinea-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #ffeb00 0%, #ffc107 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1a2a6c;
      font-size: 0.7rem;
    }

    .vuelo-aerolinea-info {
      display: flex;
      flex-direction: column;
    }

    .vuelo-aerolinea-nombre {
      font-weight: bold;
      font-size: 0.95rem;
      color: #1a2a6c;
    }

    .vuelo-clase {
      font-size: 0.8rem;
      color: #999;
    }

    .vuelo-precio-container {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .vuelo-precio {
      font-size: 2rem;
      font-weight: bold;
      color: #ffeb00;
      font-family: 'JetBrains Mono', monospace;
    }

    .vuelo-precio-nota {
      font-size: 0.8rem;
      color: #999;
    }

    .vuelo-btn {
      background: linear-gradient(135deg, #1a2a6c 0%, #16213e 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.3s ease;
    }

    .vuelo-btn:hover {
      background: linear-gradient(135deg, #ffeb00 0%, #ffc107 100%);
      color: #1a2a6c;
      transform: scale(1.05);
    }

    .sin-vuelos {
      text-align: center;
      padding: 60px 20px;
      background: #f9f9f9;
      border-radius: 12px;
      color: #666;
    }

    .sin-vuelos h3 {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .vuelo-card {
        grid-template-columns: 1fr;
      }

      .vuelo-detalles {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .vuelo-precio-container {
        text-align: left;
      }

      .vuelos-header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

    let vuelosFiltrados = [];
    let origen = '';
    let destino = '';
    let fecha = '';

    function obtenerParametrosURL() {
      const params = new URLSearchParams(window.location.search);
      origen = params.get('from') || 'Madrid';
      destino = params.get('to') || 'París (CDG)';
      fecha = params.get('date') || new Date().toISOString().split('T')[0];

      document.getElementById('origen-display').textContent = origen;
      document.getElementById('destino-display').textContent = destino;
      document.getElementById('fecha-display').textContent = new Date(fecha).toLocaleDateString('es-ES');
    }

    function cargarVuelos() {
      const rutaKey = `${origen} -> ${destino}`;
      const vuelosDisponibles = vuelosDB[rutaKey] || [];
      
      if (vuelosDisponibles.length === 0) {
        document.getElementById('vuelos-lista').innerHTML = `
          <div class="sin-vuelos">
            <h3>No hay vuelos disponibles</h3>
            <p>Lo sentimos, no encontramos vuelos desde ${origen} hacia ${destino} para esta fecha.</p>
            <a href="index.html" style="color: #1a2a6c; text-decoration: underline;">Volver a buscar</a>
          </div>
        `;
        return;
      }

      vuelosFiltrados = [...vuelosDisponibles];
      mostrarVuelos();
    }

    function aplicarFiltros() {
      const aerolineaFiltro = document.getElementById('filtro-aerolinea').value;
      const precioFiltro = parseInt(document.getElementById('filtro-precio').value);
      const ordenFiltro = document.getElementById('filtro-orden').value;

      // Actualizar display del precio
      document.getElementById('precio-valor').textContent = `Hasta ${precioFiltro}€`;

      const rutaKey = `${origen} -> ${destino}`;
      vuelosFiltrados = [...vuelosDB[rutaKey]];

      // Aplicar filtros
      if (aerolineaFiltro) {
        vuelosFiltrados = vuelosFiltrados.filter(v => v.aerolinea === aerolineaFiltro);
      }
      vuelosFiltrados = vuelosFiltrados.filter(v => v.precio <= precioFiltro);

      // Aplicar orden
      switch (ordenFiltro) {
        case 'precio-asc':
          vuelosFiltrados.sort((a, b) => a.precio - b.precio);
          break;
        case 'precio-desc':
          vuelosFiltrados.sort((a, b) => b.precio - a.precio);
          break;
        case 'hora-salida':
          vuelosFiltrados.sort((a, b) => a.salida.localeCompare(b.salida));
          break;
        case 'duracion':
          vuelosFiltrados.sort((a, b) => {
            const durA = parseInt(a.duracion);
            const durB = parseInt(b.duracion);
            return durA - durB;
          });
          break;
      }

      mostrarVuelos();
    }

    function mostrarVuelos() {
      const lista = document.getElementById('vuelos-lista');

      if (vuelosFiltrados.length === 0) {
        lista.innerHTML = `
          <div class="sin-vuelos">
            <h3>No hay vuelos que coincidan con tus filtros</h3>
            <p>Intenta ajustar los criterios de búsqueda.</p>
          </div>
        `;
        return;
      }

      lista.innerHTML = vuelosFiltrados.map(vuelo => `
        <div class="vuelo-card">
          <div class="vuelo-detalles">
            <div class="vuelo-aeropuerto">
              <div class="vuelo-hora">${vuelo.salida}</div>
              <div class="vuelo-ciudad">Salida</div>
            </div>
            
            <div class="vuelo-ruta">
              <div class="vuelo-ruta-linea"></div>
              <div class="vuelo-ruta-icon">✈</div>
              <div class="vuelo-ruta-linea"></div>
              <div class="vuelo-duracion">${vuelo.duracion}<br>${vuelo.escala}</div>
            </div>

            <div class="vuelo-aeropuerto">
              <div class="vuelo-hora">${vuelo.llegada}</div>
              <div class="vuelo-ciudad">Llegada</div>
            </div>
          </div>

          <div style="display: flex; gap: 20px; align-items: center;">
            <div class="vuelo-aerolinea">
              <div class="vuelo-aerolinea-logo">${vuelo.aerolinea.substring(0, 2)}</div>
              <div class="vuelo-aerolinea-info">
                <div class="vuelo-aerolinea-nombre">${vuelo.aerolinea}</div>
                <div class="vuelo-clase">${vuelo.clase}</div>
              </div>
            </div>

            <div class="vuelo-precio-container">
              <div class="vuelo-precio">${vuelo.precio}€</div>
              <div class="vuelo-precio-nota">por persona</div>
              <button class="vuelo-btn" onclick="seleccionarVuelo('${vuelo.aerolinea}', ${vuelo.precio})">Seleccionar</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function seleccionarVuelo(aerolinea, precio) {
      // Guardar información del vuelo seleccionado
      localStorage.setItem('vueloSeleccionado', JSON.stringify({
        aerolinea: aerolinea,
        origen: origen,
        destino: destino,
        fecha: fecha,
        precio: precio
      }));
      
      // Redirigir a página de checkout o reserva
      window.location.href = `reservar.html?destino=${encodeURIComponent(destino)}&fecha=${fecha}&precio=${precio}&aerolinea=${encodeURIComponent(aerolinea)}`;
    }

    // Inicializar
    window.addEventListener('load', () => {
      obtenerParametrosURL();
      cargarVuelos();
    });
  </script>
</body>
</html>
