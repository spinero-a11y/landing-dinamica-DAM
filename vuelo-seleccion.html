<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Selecciona tu Vuelo — VeranoSummer</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-magic-blue: #1a2a6c;
      --c-gold: #b4975a;
      --c-accent: #e63946;
      --c-bg: #f4f6f9;
    }
    body { background: var(--c-bg); font-family: 'DM Sans', sans-serif; margin: 0; }

    .booking-flow-container {
      max-width: 1200px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 30px;
      padding: 20px;
    }

    .selection-side {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    /* BOTÓN VOLVER */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--c-magic-blue);
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 25px;
      transition: 0.3s;
      opacity: 0.7;
    }
    .btn-back:hover { opacity: 1; transform: translateX(-5px); }

    .summary-side {
      background: var(--c-magic-blue);
      color: white;
      padding: 35px;
      border-radius: 25px;
      position: sticky;
      top: 20px;
      height: fit-content;
      box-shadow: 0 15px 35px rgba(26, 42, 108, 0.3);
    }

    h1, h2, h3 { font-family: 'Fraunces', serif; }
    h1 { font-size: 2.2rem; color: var(--c-magic-blue); margin-top: 0; }

    /* FORMULARIO SUPERIOR */
    .flight-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr 120px;
      gap: 15px;
      background: #f8f9fb;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 35px;
    }
    .input-field label { display: block; font-size: 0.75rem; font-weight: 700; color: #888; margin-bottom: 5px; text-transform: uppercase; }
    .input-field input, .input-field select { 
      width: 100%; border: none; background: transparent; font-size: 1rem; font-weight: 500; outline: none; color: var(--c-magic-blue);
    }

    /* TARJETAS DE VUELO */
    .flight-option {
      border: 2px solid #eee;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
    }
    .flight-option:hover { border-color: var(--c-gold); transform: translateY(-2px); }
    .flight-option.selected { border-color: var(--c-gold); background: #fffdf9; box-shadow: 0 5px 15px rgba(180, 151, 90, 0.1); }

    .flight-main-info { display: flex; align-items: center; gap: 30px; }
    .time-block { text-align: center; }
    .time-val { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 700; color: var(--c-magic-blue); }
    .city-code { font-size: 0.8rem; color: #999; font-weight: 700; }

    .route-visual { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .line { height: 2px; background: #ddd; width: 100%; position: relative; }
    .line::after { content: '✈'; position: absolute; top: -10px; left: 50%; background: white; padding: 0 5px; color: var(--c-gold); }
    .duration { font-size: 0.7rem; color: #666; }

    .price-tag { text-align: right; }
    .price-val { display: block; font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 700; color: #27ae60; }
    
    /* RESUMEN DERECHA */
    .calc-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.95rem; opacity: 0.8; }
    .total-big { font-size: 2.2rem; font-family: 'Fraunces', serif; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; margin-top: 20px; display: block; color: var(--c-gold); }

    .confirm-btn {
      width: 100%;
      margin-top: 25px;
      background: var(--c-gold);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
    }
    .confirm-btn:hover { background: #9c834d; transform: scale(1.02); }
    .confirm-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
  </style>
</head>
<body>

  <div class="booking-flow-container">
    
    <!-- LADO IZQUIERDO: SELECCIÓN -->
    <div class="selection-side">
      <a href="index.html" class="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Volver a destinos
      </a>

      <h1>Vuelos disponibles a <span id="nombre-destino" style="color:var(--c-gold)">Barcelona</span></h1>
      
      <!-- BUSCADOR RÁPIDO -->
      <div class="flight-inputs">
        <div class="input-field">
          <label>Origen</label>
          <select id="select-origen" onchange="generarVuelos()">
            <option value="Madrid (MAD)">Madrid (MAD)</option>
            <option value="Londres (LHR)">Londres (LHR)</option>
            <option value="París (CDG)">París (CDG)</option>
            <option value="Tokio (NRT)">Tokio (NRT)</option>
          </select>
        </div>
        <div class="input-field">
          <label>Fecha de Salida</label>
          <input type="date" id="fecha-vuelo" onchange="actualizarInterfaz()">
        </div>
        <div class="input-field">
          <label>Viajeros</label>
          <input type="number" id="pasajeros" value="1" min="1" oninput="actualizarInterfaz()">
        </div>
      </div>

      <h2>Opciones de vuelo encontradas</h2>
      <div id="contenedor-vuelos">
        <!-- Vuelos inyectados por JS -->
      </div>
    </div>

    <!-- LADO DERECHO: RESUMEN (STICKY) -->
    <div class="summary-side">
      <h3>Resumen del Viaje</h3>
      
      <div id="itinerario-detalle" style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 0.9rem; line-height: 1.6;">
        Selecciona un vuelo para ver los detalles.
      </div>

      <div class="calc-box">
        <div class="calc-item">
          <span>Precio por adulto</span>
          <span id="resumen-precio-unitario">0€</span>
        </div>
        <div class="calc-item">
          <span>Tasas de gestión</span>
          <span>12€</span>
        </div>
        
        <div class="total-big">
          <small style="font-size: 0.8rem; display: block; opacity: 0.7; color: white;">Total a pagar</small>
          <span id="resumen-total">0€</span>
        </div>
      </div>

      <button class="confirm-btn" id="btn-confirmar" disabled onclick="finalizarSeleccion()">
        Continuar a Pago
      </button>
    </div>

  </div>

  <script>
    // Configuración inicial
    const params = new URLSearchParams(window.location.search);
    const destinoFinal = params.get('destino') || "Barcelona (BCN)";
    let vueloSeleccionado = null;

    const aerolineas = ["Iberia", "Vueling", "Lufthansa", "British Airways"];

    function inicializar() {
      document.getElementById('nombre-destino').innerText = destinoFinal;
      const hoy = new Date();
      hoy.setDate(hoy.getDate() + 7);
      document.getElementById('fecha-vuelo').valueAsDate = hoy;
      
      generarVuelos();
    }

    function generarVuelos() {
      const origen = document.getElementById('select-origen').value;
      const contenedor = document.getElementById('contenedor-vuelos');
      contenedor.innerHTML = ""; // Limpiar

      // Generamos 3 opciones realistas
      const opciones = [
        { id: 1, aero: "Iberia", salida: "08:15", llegada: "09:30", precio: 120, duracion: "1h 15m" },
        { id: 2, aero: "Vueling", salida: "14:40", llegada: "15:55", precio: 65, duracion: "1h 15m" },
        { id: 3, aero: "Lufthansa", salida: "20:00", llegada: "21:15", precio: 95, duracion: "1h 15m" }
      ];

      opciones.forEach(v => {
        const card = document.createElement('div');
        card.className = 'flight-option';
        card.onclick = () => seleccionarVuelo(v, card);
        card.innerHTML = `
          <div class="flight-main-info">
            <div class="time-block">
              <div class="time-val">${v.salida}</div>
              <div class="city-code">${origen.split(' ')[1] || 'ORG'}</div>
            </div>
            <div class="route-visual">
              <span class="duration">${v.duracion}</span>
              <div class="line"></div>
              <span style="font-size:0.6rem; color:var(--c-gold); font-weight:bold">DIRECTO</span>
            </div>
            <div class="time-block">
              <div class="time-val">${v.llegada}</div>
              <div class="city-code">${destinoFinal.split(' ')[1] || 'DST'}</div>
            </div>
          </div>
          <div class="price-tag">
            <span style="font-size:0.7rem; color:#999">${v.aero}</span>
            <span class="price-val">${v.precio}€</span>
          </div>
        `;
        contenedor.appendChild(card);
      });
    }

    function seleccionarVuelo(vuelo, elemento) {
      // Quitar clase selected de otros
      document.querySelectorAll('.flight-option').forEach(el => el.classList.remove('selected'));
      elemento.classList.add('selected');
      
      vueloSeleccionado = vuelo;
      actualizarInterfaz();
    }

    function actualizarInterfaz() {
      const n = parseInt(document.getElementById('pasajeros').value) || 1;
      const fecha = document.getElementById('fecha-vuelo').value;
      const origen = document.getElementById('select-origen').value;

      if (vueloSeleccionado) {
        const subtotal = vueloSeleccionado.precio * n;
        const total = subtotal + 12; // +12 de tasas

        document.getElementById('resumen-precio-unitario').innerText = `${vueloSeleccionado.precio}€`;
        document.getElementById('resumen-total').innerText = `${total}€`;
        
        document.getElementById('itinerario-detalle').innerHTML = `
          <strong style="color:var(--c-gold)">IDA:</strong> ${fecha}<br>
          <strong>Vuelo:</strong> ${vueloSeleccionado.aero}<br>
          <strong>Ruta:</strong> ${origen} ➔ ${destinoFinal}<br>
          <strong>Viajeros:</strong> ${n} x Adulto
        `;
        
        document.getElementById('btn-confirmar').disabled = false;
      }
    }

    function finalizarSeleccion() {
      const total = document.getElementById('resumen-total').innerText;
      alert(`Vuelo confirmado con ${vueloSeleccionado.aero}. Total: ${total}. Redirigiendo a pago...`);
      // Aquí podrías enviar a la página de checkout definitiva
    }

    window.onload = inicializar;
  </script>
</body>
</html>
