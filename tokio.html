<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Vuelos - VeranoSummer Tokio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #1a2a6c;
      --accent: #bc002d; /* Rojo Japón */
      --bg: #f0f2f5;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      margin: 0;
      color: #333;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .header-panel {
      background: linear-gradient(135deg, var(--primary) 0%, #16213e 100%);
      color: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      margin-bottom: 30px;
    }

    /* Buscador */
    .search-card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .search-card label {
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    select {
      width: 100%;
      padding: 15px;
      border: 2px solid #e1e4e8;
      border-radius: 10px;
      font-size: 1.1rem;
      font-family: inherit;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 15px;
    }

    /* Lista de Vuelos */
    .vuelo-item {
      background: white;
      margin-bottom: 15px;
      border-radius: 12px;
      padding: 20px 30px;
      display: grid;
      grid-template-columns: 200px 1fr 180px;
      align-items: center;
      transition: all 0.3s ease;
      border: 1px solid #eee;
    }

    .vuelo-item:hover {
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border-color: var(--primary);
    }

    .airline-box {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-placeholder {
      width: 45px;
      height: 45px;
      background: #f0f0f0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: var(--primary);
      border: 1px solid #ddd;
    }

    .horarios {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      text-align: center;
    }

    .hora-txt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary);
    }

    .ruta-line {
      flex-grow: 0.5;
      height: 2px;
      background: #e0e0e0;
      position: relative;
    }

    .ruta-line::after {
      content: '✈';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 0 10px;
      color: #ccc;
    }

    .precio-box {
      text-align: right;
      border-left: 1px solid #eee;
      padding-left: 20px;
    }

    .precio-txt {
      font-size: 1.8rem;
      font-weight: 700;
      color: #27ae60;
      display: block;
    }

    .btn-reservar {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      background: #fff;
      border-radius: 15px;
      color: #888;
    }

    @media (max-width: 768px) {
      .vuelo-item { grid-template-columns: 1fr; text-align: center; gap: 20px; }
      .airline-box { justify-content: center; }
      .precio-box { border: none; padding: 0; }
    }
  </style>
</head>

  function buscarVuelos() {
    const destinoSeleccionado = document.getElementById('select-destino').value;
    const contenedor = document.getElementById('contenedor-vuelos');

    if (!destinoSeleccionado) {
      contenedor.innerHTML = '<div class="empty-state"><h3>Esperando selección...</h3><p>Elige un destino arriba para rastrear los horarios disponibles.</p></div>';
      return;
    }

    // Filtramos TODOS los vuelos que coincidan con el destino
    const resultados = vuelosDB.filter(v => v.destino === destinoSeleccionado);

    if (resultados.length === 0) {
      contenedor.innerHTML = '<div class="empty-state"><h3>Sin disponibilidad</h3><p>Lo sentimos, no hay vuelos registrados para este destino.</p></div>';
      return;
    }

    // Renderizamos cada vuelo encontrado (múltiples aerolíneas y múltiples horarios)
    contenedor.innerHTML = resultados.map(v => `
      <div class="vuelo-item">
        <div class="airline-box">
          <div class="logo-placeholder">${v.aerolinea.substring(0,2).toUpperCase()}</div>
          <div>

            <div class="hora-txt">${v.salida}</div>
            <div style="font-size: 0.8rem; font-weight: bold; color: #888;">NRT</div>
          </div>

          <div style="text-align: left">
            <div class="hora-txt">${v.llegada}</div>
            <div style="font-size: 0.8rem; font-weight: bold; color: #888;">${v.destino.split(' ')[1].replace('(','').replace(')','')}</div>

        </div>
