<script>
    // 1. BASE DE DATOS (Asegúrate de que los códigos coincidan con tu index.html)
    const airports = [
        { code: "MAD", city: "Madrid", name: "Adolfo Suárez Barajas" },
        { code: "BCN", city: "Barcelona", name: "El Prat" },
        { code: "JFK", city: "Nueva York", name: "John F. Kennedy" },
        { code: "LHR", city: "Londres", name: "Heathrow" },
        { code: "CDG", city: "París", name: "Charles de Gaulle" },
        { code: "NRT", city: "Tokio", name: "Narita" }
        // ... añadir el resto de aeropuertos aquí
    ];

    const flightData = [
        { from: "MAD", to: "JFK", airline: "Iberia", price: 450 },
        { from: "MAD", to: "LHR", airline: "British Airways", price: 60 },
        { from: "BCN", to: "CDG", airline: "Air France", price: 55 },
        { from: "BCN", to: "MAD", airline: "Vueling", price: 30 },
        { from: "JFK", to: "MAD", airline: "Delta", price: 510 },
        { from: "MAD", to: "NRT", airline: "ANA", price: 820 }
    ];

    // 2. FUNCIÓN PARA LEER LA URL Y BUSCAR
    function searchFlights() {
        const resultsDiv = document.getElementById('results');
        if (!resultsDiv) return;

        // Capturamos los parámetros de la URL: ?from=MAD&to=JFK&date=2024-05-20
        const urlParams = new URLSearchParams(window.location.search);
        const originUser = urlParams.get('from');
        const destUser = urlParams.get('to');
        const dateUser = urlParams.get('date');

        // Validamos que al menos el origen exista
        if (!originUser) {
            resultsDiv.innerHTML = "<p>No se han especificado criterios de búsqueda.</p>";
            return;
        }

        // Mostramos un mensaje de carga con los datos que el usuario eligió
        resultsDiv.innerHTML = `
            <div style="text-align:center; padding: 20px;">
                <div class="loader"></div>
                <p>Buscando vuelos de <strong>${originUser}</strong> a <strong>${destUser || 'cualquier destino'}</strong>...</p>
                <p><small>Fecha solicitada: ${dateUser || 'Próximamente'}</small></p>
            </div>`;

        setTimeout(() => {
            // LÓGICA DE FILTRADO CRÍTICA:
            let filtered = flightData.filter(flight => {
                const matchOrigin = flight.from === originUser;
                // Si el usuario no eligió destino, mostramos todos los del origen
                const matchDest = destUser ? flight.to === destUser : true;
                return matchOrigin && matchDest;
            });

            renderResults(filtered, originUser, destUser, dateUser);
        }, 1000);
    }

    // 3. RENDERIZADO DE LOS RESULTADOS
    function renderResults(flights, origin, dest, date) {
        const resultsDiv = document.getElementById('results');
        
        if (flights.length === 0) {
            resultsDiv.innerHTML = `
                <div style="text-align:center; padding: 40px; border: 1px solid #eee;">
                    <h3>Lo sentimos, no hay vuelos directos</h3>
                    <p>No encontramos rutas disponibles de <strong>${origin}</strong> a <strong>${dest || 'este destino'}</strong> para el ${date}.</p>
                    <a href="index.html" style="color: blue; text-decoration: underline;">Intentar con otro origen</a>
                </div>`;
            return;
        }

        resultsDiv.innerHTML = `<h3>Vuelos disponibles encontrados:</h3>`;

        flights.forEach(f => {
            // Simulamos un ligero cambio de precio según la fecha o el azar
            const finalPrice = f.price + Math.floor(Math.random() * 20);
            
            resultsDiv.innerHTML += `
                <div class="flight-card" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    <div>
                        <div style="font-weight: bold; color: #2c3e50;">${f.airline}</div>
                        <div style="font-size: 1.2rem; margin-top: 5px;">
                            ${f.from} ✈️ ${f.to}
                        </div>
                        <div style="font-size: 0.8rem; color: #7f8c8d;">Fecha: ${date || 'Flexible'}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 1.5rem; font-weight: bold; color: #27ae60;">${finalPrice}€</div>
                        <a href="https://www.google.com/flights?hl=es#flt=${f.from}.${f.to}.${date}" target="_blank" style="display: block; margin-top: 10px; padding: 8px 15px; background: #3498db; color: white; border-radius: 5px; text-decoration: none; font-size: 0.9rem;">Ver disponibilidad</a>
                    </div>
                </div>
            `;
        });
    }

    // Ejecutar al cargar la página
    window.onload = searchFlights;
</script>
